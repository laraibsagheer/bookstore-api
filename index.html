<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .container { max-width: 800px; margin: auto; }
        .form-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #218838; }
        .btn-delete { background: #dc3545; }
        .btn-delete:hover { background: #c82333; }
        .book-card { background: white; padding: 15px; border-radius: 8px; margin: 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .book-info h3 { color: #333; }
        .book-info p { color: #666; font-size: 14px; }
        #message { padding: 10px; border-radius: 4px; margin: 10px 0; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Bookstore</h1>

        <!-- Add Book Form -->
        <div class="form-box">
            <h2>Add New Book</h2>
            <input type="text" id="title" placeholder="Title" />
            <input type="text" id="author" placeholder="Author" />
            <input type="number" id="price" placeholder="Price" />
            <input type="text" id="isbn" placeholder="ISBN" />
            <input type="date" id="publishedDate" />
            <button onclick="addBook()">Add Book</button>
        </div>

        <div id="message"></div>

        <!-- Books List -->
        <div class="form-box">
            <h2>All Books</h2>
            <button onclick="getBooks()">Refresh Books</button>
            <div id="booksList"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/books';

        async function getBooks() {
            const res = await fetch(API);
            const books = await res.json();
            const list = document.getElementById('booksList');
            list.innerHTML = '';
            books.forEach(book => {
                list.innerHTML += `
                    <div class="book-card">
                        <div class="book-info">
                            <h3>${book.title}</h3>
                            <p>Author: ${book.author} | Price: $${book.price} | ISBN: ${book.isbn}</p>
                        </div>
                        <button class="btn-delete" onclick="deleteBook('${book._id}')">Delete</button>
                    </div>`;
            });
        }

        async function addBook() {
            const book = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                price: document.getElementById('price').value,
                isbn: document.getElementById('isbn').value,
                publishedDate: document.getElementById('publishedDate').value
            };
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(book)
            });
            const data = await res.json();
            showMessage(data.message || data.error, res.ok);
            if (res.ok) getBooks();
        }

        async function deleteBook(id) {
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            const data = await res.json();
            showMessage(data.message, res.ok);
            getBooks();
        }

        function showMessage(msg, success) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = success ? 'success' : 'error';
            setTimeout(() => el.textContent = '', 3000);
        }

        getBooks();
    </script>
</body>
</html>
